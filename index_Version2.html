<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>请假管理</title>
<style>
    /* Prevent horizontal sliding */
    html, body {overflow-x: hidden;}

    * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
    /* 页面加高以便上下滑动 */
    body {background-color:#f5f5f5; min-height:140vh;}

    /* 面包屑导航 */
    .breadcrumb-bar { background-color: #f0f4fc; padding: 14px 12px; }
    .breadcrumb { display:flex; align-items:center; gap:6px; font-size:20px; }
    .breadcrumb .location-icon { color:#4080dd; font-size:22px; }

    .top-bar { background:#fff; height:56px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid #f0f0f0; position:sticky; top:0; gap:10px;}
    .user-header { background:#fff; padding:16px 12px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:12px;}
    .avatar-placeholder { width:40px; height:40px; border-radius:50%; background:#f5f5f5; }
    .gender-icon-img { width:28px; height:28px; display:inline-block; vertical-align:middle; }

    .leave-info-section { background:#fff; margin-top:10px; padding:16px 12px; position:relative; }

    /* Shrink the "办理进度" title a little */
    .section-title { font-size:20px; font-weight:700; color:#333; margin-bottom:12px; padding-left:6px; border-left:5px solid #3683eb; display:flex; justify-content:space-between; align-items:center; }

    /*
      已通过印章（更新）
      - stamp box controlled by --passed-size
      - outer solid circle (::after) and inner dashed circle (::before) enlarged but kept <= banner length.
      - banner contains a dashed inner rectangle between banner border and text (does not cover text).
      - Adjusted: inner dashed rectangle inset reduced (closer to border), and text enlarged (but constrained by banner).
    */
    :root {
      --passed-size: 72px; /* stamp container diameter */
    }

    .passed-stamp {
      position:absolute;
      top:20px;
      right:16px;
      width:var(--passed-size);
      height:var(--passed-size);
      border-radius:50%;
      box-sizing:border-box;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:50;
      background: transparent;
      pointer-events: none;
    }

    /* outer solid circle enlarged (small inset so diameter larger) */
    .passed-stamp::after {
      content: '';
      position: absolute;
      left: 2px;   /* smaller inset -> larger outer circle */
      top: 2px;
      right: 2px;
      bottom: 2px;
      border-radius: 50%;
      border: 2px solid #8fcfbf; /* outer solid */
      box-sizing: border-box;
      z-index:51;
      pointer-events:none;
    }

    /* inner dashed ring (also enlarged but slightly inset from outer) */
    .passed-stamp::before {
      content: '';
      position: absolute;
      left: 6px;   /* inner inset */
      top: 6px;
      right: 6px;
      bottom: 6px;
      border-radius: 50%;
      border: 2px dashed #a8d5cb;
      box-sizing: border-box;
      z-index:52;
      pointer-events:none;
    }

    /* banner from left-top -> right-bottom; ensure banner length >= outer circle diameter
       banner has its own solid border; inside it we place a dashed inner rectangle (not overlapping text) */
    .passed-stamp .label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%) rotate(18deg); /* left-top -> right-bottom */
      /* reduce vertical padding slightly to allow larger text */
      padding: calc(var(--passed-size) * 0.10) calc(var(--passed-size) * 0.28);
      border: 2px solid #a8d5cb; /* banner solid border */
      border-radius: 8px;
      background: #fff; /* pure white background */
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: #88b8aa; /* light green text */
      font-weight: 700;
      /* enlarged text but constrained by banner via min-width and padding */
      font-size: calc(var(--passed-size) * 0.24);
      line-height:1;
      text-align:center;
      pointer-events: none;
      box-sizing: border-box;
      z-index:54; /* topmost inside the stamp */
      display:inline-block;
      white-space:nowrap;
      /* ensure banner length is larger than the outer circle diameter */
      min-width: calc(var(--passed-size) * 1.25);
    }

    /* dashed inner rectangle inside banner, positioned between banner border and text
       reduced inset so dashed rectangle is closer to banner border (距离缩短) */
    .passed-stamp .label .inner-dash {
      position: absolute;
      left: 3px;   /* reduced gap to banner border */
      top: 3px;
      right: 3px;
      bottom: 3px;
      border-radius: 6px;
      border: 2px dashed #a8d5cb;
      box-sizing: border-box;
      z-index:52; /* below text (text will be z-index:55) */
      pointer-events: none;
    }
    .passed-stamp .label .text {
      position: relative;
      z-index:55;
      display:inline-block;
      padding: 0 2px; /* ensure inner-dash does not touch text */
    }

    /* Info rows */
    .info-item { margin-bottom:10px; font-size:18px; display:flex; align-items:center; gap:6px; }
    .info-label { color:#999; min-width:100px; font-size:15px; flex:0 0 auto; }
    .info-value { color:#333; margin-left:2px; flex:1 1 auto; word-break:break-word; font-size:16px; }

    .process-section { background:#fff; margin-top:10px; padding:12px; position:relative; }

    /* Reduced vertical spacing */
    .process-item { position:relative; padding-left:28px; padding-bottom:12px; }
    .process-item:last-child { padding-bottom:8px; }

    /* circle sizing to match text, white background */
    :root {
      --circle-size: 18px;
      --circle-border: 2px;
    }

    .process-check {
      position:absolute;
      left:0;
      top:6px;
      width:var(--circle-size);
      height:var(--circle-size);
      border-radius:50%;
      border:var(--circle-border) solid #3683eb;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#3683eb;
      font-size:12px;
      line-height:1;
      box-sizing:border-box;
      z-index: 20;
    }
    .process-check.done { background:#fff; color:#3683eb; border-color:#3683eb; }
    .process-check.current { background:#fff; color:#3683eb; border-color:#3683eb; }

    /* Vertical connector line aligned with circle center */
    .process-item::before {
      content:'';
      position:absolute;
      left: calc(var(--circle-size) / 2);
      top: calc(6px + var(--circle-size) / 2);
      width:2px;
      height:calc(100% - (6px + var(--circle-size) / 2));
      background:#3683eb;
      z-index: 10;
    }
    .process-item:last-child::before { display:none; }

    /*
      Make process-content sit immediately to the right of the circle (no gap).
    */
    .process-content {
      margin-left: calc(var(--circle-size));
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      flex-wrap:nowrap;
      min-width:0;
    }

    /* Slightly smaller process text */
    .process-name { font-size:18px; color:#333; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .process-status { font-size:16px; color:#30bd58; margin-left:0; }
    .process-person { font-size:14px; color:#666; margin-top:0; }
    .person-value { display:block; color:inherit; margin-left:0; font-size:14px; padding-top:2px; }

    /* Time: small and full display */
    .process-time {
      font-size:11px;
      color:#999;
      white-space:nowrap;
      align-self:flex-start;
      margin-top:4px;
      flex:0 0 auto;
      padding-left:6px;
    }

    /* Editable styles (outline when editable) */
    .info-value[contenteditable="true"],
    .person-value[contenteditable="true"],
    .process-time[contenteditable="true"],
    .process-person[contenteditable="true"] {
      outline: 2px dashed rgba(54,131,235,0.25);
      padding:6px;
      border-radius:4px;
      background:#fff;
      color: #222;
    }

    .visually-hidden { position:absolute!important; height:1px; width:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap; border:0; padding:0; margin:-1px; }

    /* Responsive tweaks */
    @media (max-width:820px){
      :root { --circle-size: 16px; --passed-size: 60px; }
      .section-title { font-size:18px; }
      .process-content { margin-left: calc(var(--circle-size)); gap:6px; }
      .process-name { font-size:16px; }
      .process-time { font-size:10px; }
      .process-person, .person-value { font-size:13px; }
      .info-item { font-size:16px; }
      .passed-stamp { top:18px; right:14px; width:var(--passed-size); height:var(--passed-size); }
      .passed-stamp::after { left:2px; top:2px; right:2px; bottom:2px; }
      .passed-stamp::before { left:6px; top:6px; right:6px; bottom:6px; }
      .passed-stamp .label { font-size: calc(var(--passed-size) * 0.20); padding: calc(var(--passed-size) * 0.10) calc(var(--passed-size) * 0.22); min-width: calc(var(--passed-size) * 1.25); }
      .passed-stamp .label .inner-dash { left:3px; top:3px; right:3px; bottom:3px; }
    }

    @media (max-width:420px){
      :root { --circle-size: 16px; --passed-size: 56px; }
      .section-title { font-size:17px; }
      .process-content { margin-left: calc(var(--circle-size)); gap:6px; }
      .process-name { font-size:15px; }
      .process-time { font-size:10px; }
      .process-person, .person-value { font-size:12px; }
      .info-item { font-size:15px; }
      body { overflow-x:hidden; }
      .passed-stamp { top:16px; right:12px; width:var(--passed-size); height:var(--passed-size); }
      .passed-stamp::after { left:3px; top:3px; right:3px; bottom:3px; }
      .passed-stamp::before { left:5px; top:5px; right:5px; bottom:5px; }
      .passed-stamp .label { font-size: calc(var(--passed-size) * 0.20); padding: calc(var(--passed-size) * 0.09) calc(var(--passed-size) * 0.20); min-width: calc(var(--passed-size) * 1.25); }
      .passed-stamp .label .inner-dash { left:3px; top:3px; right:3px; bottom:3px; }
    }
</style>
</head>
<body>
<div class="breadcrumb-bar">
  <div class="breadcrumb">
    <span class="location-icon">📍</span>
    <span class="home-link">首页</span>
    <span class="separator">></span>
    <span class="current-page">请假管理</span>
  </div>
</div>

<div class="user-header">
  <div class="avatar-placeholder"></div>
  <!-- 男性标识（蓝色） -->
  <svg class="gender-icon-img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#3683eb" role="img" aria-label="男性标识">
    <path d="M14 4h6v6h-2V6.414l-4.293 4.293-1.414-1.414L16.586 5H14V4zM10 10a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM10 12a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
  </svg>
</div>

<section class="leave-info-section" aria-labelledby="leave-info-title">
  <div class="section-title" id="leave-info-title">
    <span>请假信息</span>
    <div class="section-tools">
      <div class="passed-stamp" title="审核状态" role="img" aria-label="已通过">
        <div class="label" aria-hidden="true">
          <div class="inner-dash" aria-hidden="true"></div>
          <span class="text">已通过</span>
        </div>
      </div>
    </div>
  </div>

  <div class="info-item" data-field="type">
    <span class="info-label">请假类型：</span>
    <span class="info-value" data-key="type">其它</span>
  </div>

  <div class="info-item" data-field="destination">
    <span class="info-label">请假去向：</span>
    <span class="info-value" data-key="destination"></span>
  </div>

  <div class="info-item" data-field="address">
    <span class="info-label">详细地址：</span>
    <span class="info-value" data-key="address"></span>
  </div>

  <div class="info-item" data-field="start">
    <span class="info-label">开始时间：</span>
    <span class="info-value" data-key="start">2026-04-24 17:00:00</span>
  </div>

  <div class="info-item" data-field="end">
    <span class="info-label">结束时间：</span>
    <span class="info-value" data-key="end">2026-04-24 22:00:00</span>
  </div>

  <div class="info-item" data-field="duration">
    <span class="info-label">统计时长：</span>
    <span class="info-value" data-key="duration">天小时分钟</span>
  </div>

  <div class="info-item" data-field="contact">
    <span class="info-label">紧急联系人：</span>
    <span class="info-value" data-key="contact"></span>
  </div>

  <div class="info-item" data-field="contact_phone">
    <span class="info-label">紧急联系人电话：</span>
    <span class="info-value" data-key="contact_phone"></span>
  </div>

  <div class="info-item" data-field="reason">
    <span class="info-label">请假理由：</span>
    <span class="info-value" data-key="reason">外出与家人就餐</span>
  </div>

  <div class="info-item" data-field="status">
    <span class="info-label">请假状态：</span>
    <span class="info-value approved" data-key="status">审核通过</span>
  </div>

  <div class="info-item" data-field="cancel_status">
    <span class="info-label">销假状态：</span>
    <span class="info-value" data-key="cancel_status"></span>
  </div>

  <div class="info-item" data-field="attachments">
    <span class="info-label">请假附件：</span>
    <span class="info-value" data-key="attachments"></span>
  </div>
</section>

<section class="process-section" aria-labelledby="process-title">
  <div class="section-title" id="process-title" style="border-left:6px solid #3683eb; padding-left:8px; margin-bottom:12px;">
    办理进度
  </div>

  <div class="process-item">
    <div class="process-check done">✓</div>
    <div class="process-content">
      <div class="process-left">
        <div>
          <span class="process-name">申请</span>
          <span class="process-status">申请</span>
        </div>
        <div class="process-person"><span class="person-value" data-key="applicant">学生A</span></div>
      </div>
      <time class="process-time" datetime="2026-04-24T16:28">2026-04-24 16:28</time>
    </div>
  </div>

  <div class="process-item">
    <div class="process-check done">✓</div>
    <div class="process-content">
      <div class="process-left">
        <div>
          <span class="process-name">辅导员审核</span>
          <span class="process-status">审核通过</span>
        </div>
        <div class="process-person"><span class="person-value" data-key="counselor">辅导员B</span></div>
      </div>
      <time class="process-time" datetime="2026-04-24T16:50">2026-04-24 16:50</time>
    </div>
  </div>

  <div class="process-item">
    <div class="process-check current">◉</div>
    <div class="process-content">
      <span class="process-name">结束</span>
    </div>
  </div>
</section>

<script>
  (function(){
    const leaveSection = document.querySelector('.leave-info-section');
    const processItems = Array.from(document.querySelectorAll('.process-section .process-item'));
    const editableProcessEntries = processItems.slice(0, 2); // first two entries editable

    // mode: 'view' or 'edit'
    let mode = 'view';

    // five-click detection on "blank area"
    let clickCount = 0;
    let clickTimer = null;
    const CLICK_TIMEOUT = 1500; // ms to reset click count

    // helper: determine if click was on blank area
    // Updated: only ignore clicks on interactive controls (buttons/links/inputs/svg),
    // so clicks on the page background or inside content areas count as "blank".
    function isBlankAreaTarget(target) {
      // If it's a control or inside a control, treat as non-blank
      if (target.closest('button, a, input, textarea, select, label, [role="button"], [role="link"]')) return false;
      if (target.tagName === 'SVG' || target.closest('svg')) return false;
      // Otherwise treat it as blank (this allows clicking inside leave-info-section/process-section)
      return true;
    }

    document.addEventListener('click', function(e){
      if (!isBlankAreaTarget(e.target)) {
        // not a blank-area click, ignore
        return;
      }
      clickCount++;
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; clickTimer = null; }, CLICK_TIMEOUT);

      if (clickCount >= 5) {
        // toggle mode
        if (mode === 'view') enterEditAll();
        else saveAll();
        clickCount = 0;
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      }
    });

    // Esc restores originals and exits edit mode (if in edit)
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape') {
        if (mode === 'edit') {
          restoreOriginalsAndExit();
        }
      }
      // Ctrl/Cmd + Enter saves all if in edit mode
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        if (mode === 'edit') {
          saveAll();
        }
      }
    });

    function enterEditAll() {
      // make leave info editable
      const allValueEls = leaveSection.querySelectorAll('.info-value');
      allValueEls.forEach(el => {
        el.dataset.original = el.textContent || '';
        el.contentEditable = "true";
      });

      // make process times and persons editable for first two entries
      editableProcessEntries.forEach(item => {
        const timeEl = item.querySelector('.process-time');
        if (timeEl) {
          timeEl.dataset.original = timeEl.textContent || '';
          timeEl.contentEditable = "true";
        }
        const personEl = item.querySelector('.person-value');
        if (personEl) {
          personEl.dataset.original = personEl.textContent || '';
          personEl.contentEditable = "true";
        }
      });

      mode = 'edit';

      // focus first editable field for convenience
      const firstEditable = leaveSection.querySelector('.info-value, .process-person .person-value, .process-time');
      if (firstEditable) firstEditable.focus();
      // optional visual hint: briefly flash border on editable fields (handled by CSS outline)
    }

    function saveAll() {
      // Here you would collect data and submit to backend (collectData)
      // For now we just exit edit mode and remove dataset.original
      const allValueEls = leaveSection.querySelectorAll('.info-value');
      allValueEls.forEach(el => {
        el.contentEditable = "false";
        delete el.dataset.original;
      });

      editableProcessEntries.forEach(item => {
        const timeEl = item.querySelector('.process-time');
        if (timeEl) {
          timeEl.contentEditable = "false";
          delete timeEl.dataset.original;
        }
        const personEl = item.querySelector('.person-value');
        if (personEl) {
          personEl.contentEditable = "false";
          delete personEl.dataset.original;
        }
      });

      mode = 'view';
      // TODO: call collectData() to submit changes to backend if needed
    }

    function restoreOriginalsAndExit() {
      // restore leave info
      leaveSection.querySelectorAll('.info-value[contenteditable="true"]').forEach(el => {
        el.textContent = el.dataset.original || '';
        el.contentEditable = "false";
        delete el.dataset.original;
      });
      // restore process fields
      editableProcessEntries.forEach(item => {
        const timeEl = item.querySelector('.process-time[contenteditable="true"]');
        if (timeEl) {
          timeEl.textContent = timeEl.dataset.original || '';
          timeEl.contentEditable = "false";
          delete timeEl.dataset.original;
        }
        const personEl = item.querySelector('.person-value[contenteditable="true"]');
        if (personEl) {
          personEl.textContent = personEl.dataset.original || '';
          personEl.contentEditable = "false";
          delete personEl.dataset.original;
        }
      });
      mode = 'view';
    }

    // helper: collect data (optional)
    function collectData() {
      const data = {};
      leaveSection.querySelectorAll('.info-value').forEach(el => {
        const key = el.dataset.key || '';
        data[key] = el.textContent.trim();
      });
      editableProcessEntries.forEach((item, idx) => {
        const timeEl = item.querySelector('.process-time');
        const personEl = item.querySelector('.person-value');
        data[`process_${idx+1}_time`] = timeEl ? timeEl.textContent.trim() : '';
        data[`process_${idx+1}_person`] = personEl ? personEl.textContent.trim() : '';
      });
      console.log('收集到的数据：', data);
      return data;
    }

    // Expose for debugging in console
    window._debug_leave_collectData = collectData;
    window._debug_leave_mode = () => mode;
  })();
</script>

</body>
</html>
